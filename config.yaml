# config.yaml — 默认仿真配置（100 agent，50 步）
# 场景：大学校园多群舆情扩散
# 用法：python3 run_sim.py
#       python3 run_sim.py --config config.yaml
#
# 【v2 变更】
#   agent_type_ratio 键名对齐新 AgentType: ORDINARY/ACTIVE/RATIONAL/CONTROLLER
#   新增 group_type_ratio: DORM/CLASS/MAJOR/CAMPUS
#
# 【W4 LLM 变更】
#   llm_config 新增完整配置字段，详见下方注释

n_agents: 100

agent_type_ratio:
  ORDINARY:    0.70   # 70 个普通群员（多数沉默，偶尔附和/提问）
  ACTIVE:      0.10   # 10 个活跃讨论者（乐于转发、分享信息）
  RATIONAL:    0.10   # 10 个理性讨论者（质疑信息真实性）
  CONTROLLER:  0.10   # 10 个管理者（提醒、澄清、禁言、公告）

group_type_ratio:
  DORM:   0.25   # 宿舍群（管理强度很弱，β₁=0.05）
  CLASS:  0.35   # 班级群（管理强度中弱，β₂=0.12）
  MAJOR:  0.25   # 专业群（管理强度中，β₃=0.20）
  CAMPUS: 0.15   # 校园群（管理强度强，β₄=0.30）

network_type: "barabasi_albert"   # 无标度网络（幂律分布，类似真实社交网络）
network_params:
  m: 3                             # 每个新节点连接 m 条边

n_steps: 50

hawkes_params:
  mu:    0.1    # 基线强度
  alpha: 0.5    # 激励系数
  beta:  1.0    # 衰减系数

# ── LLM 配置（W4 新增）────────────────────────────────────────────────────
#
# 三种使用方式：
#
# 方式 A：本地测试（无需 API Key，Agent 全部走规则存根）
#   llm_config: {}
#
# 方式 B：Mock 模式（import llm_utils 成功，但不调真实 API）
#   llm_config:
#     provider: mock
#
# 方式 C：接入 DeepSeek 真实 API
#   llm_config:
#     provider: deepseek
#     api_key: ""            # 留空则读环境变量 DEEPSEEK_API_KEY
#     model: deepseek-v4-flash
#     temperature: 0.3
#     timeout: 30
#     max_retries: 2
#     fallback_mock: true    # Key 失效 / 网络错误时自动降级，不崩溃
#
# ── 当前设置（方式 B，联调冒烟验证推荐）──────────────────────────────────
llm_config:
  provider: mock            # 改为 deepseek 即接入真实 API

random_seed: null   # null = 每次随机种子
